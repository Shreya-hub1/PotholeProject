<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pothole Reporting Dashboard</title>

    <style>
        :root {
            --primary: #4facfe;
            --primary-dark: #007bff;
            --bg-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --white: #ffffff;
            --text: #333;
            --shadow: 0px 8px 30px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        /* Top Header / Logout area */
        .top-nav {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: white;
            color: var(--primary-dark);
        }

        /* Main Dashboard Card */
        .container {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            margin: 20px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--text);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
            color: #666;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box; /* Prevents width overflow */
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.3);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        /* Navigation Section */
        .nav-actions {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #555;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            color: var(--text);
        }
    </style>

    <script>
        function validateForm() {
            const location = document.getElementById("location").value.trim();
            const area = document.getElementById("area").value.trim();

            if (!location || !area) {
                alert("Please fill in all fields.");
                return false;
            }

            if (location.length < 3) {
                alert("Location name is too short.");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>

    <div class="top-nav">
        <button class="btn-logout" onclick="window.location.href='logout.html'">Logout</button>
    </div>

    <div class="container">
        <h2>Report a Pothole</h2>
        
        <form action="addPothole" method="post" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="location">Street Location</label>
                <input type="text" id="location" name="location" placeholder="e.g. 5th Avenue">
            </div>

            <div class="form-group">
                <label for="area">City Area</label>
                <input type="text" id="area" name="area" placeholder="e.g. Downtown">
            </div>

            <div class="form-group">
                <label for="severity">Severity Level</label>
                <select id="severity" name="severity">
                    <option value="Low">Low (Surface crack)</option>
                    <option value="Medium">Medium (Deep hole)</option>
                    <option value="High">High (Axle breaker)</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Report Pothole</button>
        </form>

        <div class="nav-actions">
            <button class="btn-secondary" onclick="window.location.href='view.html'">View All Reports</button>
            <button class="btn-secondary" onclick="window.location.href='update.html'">Update Status</button>
            <button class="btn-secondary" onclick="window.location.href='delete.html'">Delete Report</button>
        </div>
    </div>

</body>
</html>
