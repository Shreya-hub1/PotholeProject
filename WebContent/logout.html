<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out</title>

    <style>
        :root {
            --primary: #4facfe;
            --primary-dark: #007bff;
            --bg-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --white: #ffffff;
            --text: #333;
            --shadow: 0px 8px 30px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            background: var(--white);
            padding: 50px 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        /* The Logout Icon (Checkmark or Exit circle) */
        .icon-circle {
            width: 70px;
            height: 70px;
            background: #f0f9ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
            border: 2px solid #e0f2fe;
        }

        h2 {
            margin-top: 0;
            color: var(--text);
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.3);
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-circle">
            <span>&rarr;</span>
        </div>

        <h2>Successfully Logged Out</h2>
        <p>Thank you for using the Pothole Reporting System. You have been safely logged out of your account.</p>
        
        <a href="index.html" class="btn-login">Login Again</a>

        <div class="footer-text">
            Pothole Management System &copy; 2026
        </div>
    </div>

</body>
</html>
