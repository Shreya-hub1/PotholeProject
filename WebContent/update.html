<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Pothole Status</title>

    <style>
        :root {
            --primary: #4facfe;
            --primary-dark: #007bff;
            --bg-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --white: #ffffff;
            --text: #333;
            --shadow: 0px 8px 30px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: var(--text);
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #444;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.3);
        }

        .btn-update {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.3);
        }

        .btn-update:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-back {
            display: inline-block;
            margin-top: 25px;
            background: transparent;
            color: #888;
            border: none;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-back:hover {
            color: var(--text);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Update Status</h2>
        <p>Enter the ID to mark a pothole as repaired.</p>
        
        <form action="updatePothole" method="post">
            <div class="form-group">
                <label for="potholeId">Pothole Reference ID</label>
                <input type="number" id="potholeId" name="id" placeholder="e.g. 101" required>
            </div>

            <input type="hidden" name="status" value="Fixed">

            <button type="submit" class="btn-update">Mark as Fixed</button>
        </form>

        <button class="btn-back" onclick="window.location.href='index.html'">
            &larr; Return to Dashboard
        </button>
    </div>

</body>
</html>
